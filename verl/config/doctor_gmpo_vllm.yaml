hydra:
  searchpath:
    - file:///tmp/verl_src/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  max_prompt_length: 512
  max_response_length: 512
  train_batch_size: 16
  return_raw_chat: False
  seed: 1

actor_rollout_ref:
  hybrid_engine: True
  rollout:
    name: vllm
    multi_turn:
      enable: False

trainer:
  npu_profile:
    options: null
